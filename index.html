<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategic Policy Atlas — ASPI &amp; Lowy</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">Loading the atlas…</div>

    <header id="topbar">
      <div class="brand">
        <span class="brand-mark">◴</span>
        <span class="brand-name">Strategic Policy Atlas</span>
        <span class="brand-sub" id="brand-sub">ASPI · Lowy — 26,726 articles in embedding space</span>
      </div>
      <div class="topbar-controls">
        <div class="proj-switch" role="group" aria-label="Map projection">
          <span class="proj-label">Detail</span>
          <button class="proj-btn" data-proj="5" title="n_neighbors 5 — local structure, many small clusters">Local</button>
          <button class="proj-btn active" data-proj="25" title="n_neighbors 25 — balanced (default)">Balanced</button>
          <button class="proj-btn" data-proj="125" title="n_neighbors 125 — global structure, broad regions">Global</button>
        </div>
        <div class="date-range" title="Filter by date — linked to the timeline">
          <input type="date" id="date-from" aria-label="From date" />
          <span class="date-arrow">→</span>
          <input type="date" id="date-to" aria-label="To date" />
        </div>
        <span id="result-count">—</span>
        <button id="reset">Reset</button>
      </div>
    </header>

    <main id="layout">
      <!-- LEFT: filtering -->
      <aside id="filters" class="rail">
        <section class="rail-section">
          <h3>Filter</h3>
          <label class="field">
            <span class="field-label">Title contains</span>
            <span class="field-input">
              <input id="f-title" type="search" autocomplete="off" placeholder="e.g. submarine" />
              <button class="field-clear" type="button" aria-label="Clear title filter">×</button>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Author contains</span>
            <span class="field-input">
              <input id="f-author" type="search" autocomplete="off" placeholder="e.g. Davis" />
              <button class="field-clear" type="button" aria-label="Clear author filter">×</button>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Tag contains</span>
            <span class="field-input">
              <input id="f-tag" type="search" autocomplete="off" placeholder="e.g. cyber" />
              <button class="field-clear" type="button" aria-label="Clear tag filter">×</button>
            </span>
          </label>
        </section>

        <section class="rail-section">
          <h3>Source</h3>
          <div class="legend">
            <button class="src-toggle" data-src="0"><span class="dot aspi"></span>ASPI</button>
            <button class="src-toggle" data-src="1"><span class="dot lowy"></span>Lowy</button>
          </div>
        </section>

        <section class="rail-section timeline-section">
          <h3>Timeline</h3>
          <div id="timeline"><svg id="timeline-svg"></svg></div>
          <p class="hint">Drag vertically, or set dates above, to filter by date</p>
        </section>
      </aside>

      <!-- CENTRE: map -->
      <section id="map-container">
        <canvas id="map-canvas"></canvas>
        <svg id="map-svg">
          <g id="links-group"></g>
          <g id="labels-group"></g>
        </svg>
        <div class="map-frame" aria-hidden="true">
          <span class="reg tl"></span><span class="reg tr"></span>
          <span class="reg bl"></span><span class="reg br"></span>
          <span class="frame-tag">UMAP · n=25 · semantic distance</span>
        </div>
        <div class="grain" aria-hidden="true"></div>
        <div id="tooltip"></div>
        <aside id="detail-panel"></aside>
      </section>

      <!-- RIGHT: leaderboards (read-only) -->
      <aside id="rail" class="rail">
        <section class="rail-section">
          <h3>Top tags</h3>
          <div id="tag-list" class="board"></div>
        </section>
        <section class="rail-section">
          <h3>Top authors</h3>
          <div id="author-list" class="board"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
