<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASPI Strategist Embedding Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading-indicator">Loading Articles...</div>

    <div id="container">
      <aside id="controls">
        <header>
          <h1>ASPI <em>Strategist</em></h1>
          <p class="subtitle">Embedding Explorer</p>
        </header>

        <section class="control-section">
          <h2>Filter A</h2>
          <div class="filter-row">
            <select id="filter-a-type">
              <option value="">-- Select Type --</option>
              <option value="tag">Tag</option>
              <option value="author">Author</option>
            </select>
            <select id="filter-a-value" disabled>
              <option value="">-- Select Value --</option>
            </select>
          </div>
          <div class="filter-indicator">
            <span class="color-swatch color-a"></span>
            <span id="filter-a-count">0 articles</span>
          </div>
        </section>

        <section class="control-section">
          <h2>Filter B</h2>
          <div class="filter-row">
            <select id="filter-b-type">
              <option value="">-- Select Type --</option>
              <option value="tag">Tag</option>
              <option value="author">Author</option>
            </select>
            <select id="filter-b-value" disabled>
              <option value="">-- Select Value --</option>
            </select>
          </div>
          <div class="filter-indicator">
            <span class="color-swatch color-b"></span>
            <span id="filter-b-count">0 articles</span>
          </div>
        </section>

        <section class="control-section">
          <h2>Intersection</h2>
          <div class="intersection-legend">
            <div class="legend-item">
              <span class="color-swatch color-both"></span>
              <span>A AND B</span>
              <span id="filter-both-count" class="count">0</span>
            </div>
            <div class="legend-item">
              <span class="color-swatch color-xor"></span>
              <span>A XOR B</span>
              <span id="filter-xor-count" class="count">0</span>
            </div>
          </div>
        </section>

        <section class="control-section">
          <button id="reset-filters-btn">Reset All Filters</button>
        </section>

        <footer>
          <p id="article-count">0 articles total</p>
        </footer>
      </aside>

      <main id="visualization-area">
        <div id="scatterplot-container">
          <canvas id="scatterplot-canvas"></canvas>
          <svg id="scatterplot-svg">
            <defs>
              <pattern
                id="grid-pattern"
                width="50"
                height="50"
                patternUnits="userSpaceOnUse"
              >
                <path
                  d="M 50 0 L 0 0 0 50"
                  fill="none"
                  stroke="#ccc"
                  stroke-width="1"
                  stroke-dasharray="4,4"
                />
              </pattern>
            </defs>
            <g class="scatterplot-content">
              <rect class="grid-background" fill="url(#grid-pattern)"></rect>
              <g class="axis x-axis"></g>
              <g class="axis y-axis"></g>
              <circle
                class="hover-highlight"
                r="8"
                fill="none"
                stroke="#000"
                stroke-width="2"
                stroke-dasharray="4,2"
                pointer-events="none"
                display="none"
              ></circle>
            </g>
          </svg>
        </div>
        <div id="tooltip"></div>
      </main>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
